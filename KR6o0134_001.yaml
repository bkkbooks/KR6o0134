body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳教大師臣法天奉詔譯歸命一切智一切世間師牟尼大法王一百八名號無邊功德海具足衆吉祥能滅諸有情罪業諸煩惱我今歸命禮一切大吉祥救度諸群生令得大安樂我今歸命禮悲愍二足尊圓滿於衆生一切吉祥事我今歸命禮無相無上尊成就天中天祕密大明義如來正等覺利樂於世間最上百八名我今集彼説南無一切義成就南無正等覺南無一切智南無大釋子南無一切法自在無畏南無大金仙南無功德海南無如來南無應供南無善逝南無世尊南無一切世間解南無離一切垢染南無最上法燈南無無畏淨飯王子南無甘蔗王種南無瞿曇南無日族南無吉祥大牟尼南無囕擬囉娑族南無天人師南無十力降魔軍南無離過除毒南無調御丈夫南無妙解脫南無除障暗南無止息降諸根南無清淨戒南無無垢王南無滅罪無我相南無無驚無怖畏南無第一法圓滿南無無邊無可喻南無大論師南無希有不思議精進南無三界親慈父南無三明知三世南無滅三毒南無具足三變通南無説三乘菩提南無無相亦無老南無無我無二執南無無怨無戲論南無無業無怖南無施願無畏南無法師子二足尊南無調伏除煩惱南無最上意清淨南無明行足南無自在變化王南無調伏心清淨南無離塵無上士南無止息一切罪南無得清涼南無得寂靜南無救度世間師南無勇猛大清淨智南無圓滿吉祥相南無能除怨南無沙門月南無釋師子南無作善清淨業南無六佛法莊嚴南無六根清淨眼南無第一六神通南無六趣海到彼岸南無無師自然覺南無善逝德成就南無一切世間為愛樂南無無等大智慧南無恆入三摩地南無一切有情利益主南無真實降諸根南無一切世間尊南無普遍有情精進者南無永過輪回苦南無圓滿諸所求南無降伏得最勝説四諦南無到彼岸度他大龍王南無得最上涅槃南無尊師大梵行南無第一寂靜樂南無祕密最勝大丈夫南無調伏聲聞者南無利益諸有情南無世間供養出世智南無聖智照世間南無離世法利養南無出世為如來南無大法主南無大法王南無調御明南無救度第一二足尊南無行忍辱南無善意端嚴相南無善持善戒相南無金色光善逝南無善逾愛尊重南無人師子吉祥雲南無佛陀南無無畏獨除暗南無無邊利世間南無無等三有師南無能斷諸結縛南無無我最第一南無普照一切眼南無證理淨慧眼南無三慧真實眼如是一百八名若復有人於其辰朝發志誠心或讀誦或禮念或憶持或聽聞獲得最上吉祥福德所有一切煩惱及諸罪業速得清淨不受輪回當得解脫乃至成佛此大牟尼功德名我今讀誦及禮念普將回施與群生同得證成菩提果
